<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daftar Akaun Baru</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #e3f0ff 0%, #f0f7ff 100%);
    position: relative;
    overflow-x: hidden;
  }
  
  body::before {
    content: '';
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    background: 
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%231976d2" fill-opacity="0.05" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,112C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom center / 100% 250px no-repeat,
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%2343a047" fill-opacity="0.04" d="M0,160L48,170.7C96,181,192,203,288,197.3C384,192,480,160,576,149.3C672,139,768,149,864,165.3C960,181,1056,203,1152,197.3C1248,192,1344,160,1392,144L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom center / 100% 200px no-repeat;
    animation: wave-animation 15s ease-in-out infinite;
  }
  
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    background: 
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%2342a5f5" fill-opacity="0.06" d="M0,64L48,80C96,96,192,128,288,128C384,128,480,96,576,90.7C672,85,768,107,864,122.7C960,139,1056,149,1152,138.7C1248,128,1344,96,1392,80L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>') top center / 100% 200px no-repeat,
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%2366bb6a" fill-opacity="0.04" d="M0,96L48,106.7C96,117,192,139,288,138.7C384,139,480,117,576,101.3C672,85,768,75,864,90.7C960,107,1056,149,1152,154.7C1248,160,1344,128,1392,112L1440,96L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>') top center / 100% 180px no-repeat;
    animation: wave-animation-reverse 18s ease-in-out infinite;
  }
  
  @keyframes wave-animation {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(-2%) translateY(-3px); }
    50% { transform: translateX(0) translateY(-5px); }
    75% { transform: translateX(2%) translateY(-3px); }
  }
  
  @keyframes wave-animation-reverse {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(2%) translateY(3px); }
    50% { transform: translateX(0) translateY(5px); }
    75% { transform: translateX(-2%) translateY(3px); }
  }

  .container {
    position: relative;
    background: #fff;
    border-radius: 28px;
    padding: 40px 36px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(25,118,210,0.15), 0 3px 12px rgba(0,0,0,0.08);
    z-index: 5;
    animation: fadeInUp 0.6s ease-out;
  }
  
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  h2 {
    color: #1976d2;
    margin-bottom: 24px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 12px;
    border: 2px solid #e3f0ff;
    font-size: 15px;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }
  
  input:focus {
    outline: none;
    border-color: #1976d2;
    box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
  }

  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #43a047 0%, #66bb6a 100%);
    color: #fff;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(67,160,71,0.3);
    position: relative;
    overflow: hidden;
  }
  
  button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }
  
  button:hover::before {
    width: 300px;
    height: 300px;
  }
  
  button:hover { 
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 6px 20px rgba(67,160,71,0.4);
  }
  
  button:active {
    transform: translateY(-1px);
  }

  a {
    display: inline-block;
    margin-top: 16px; /* jarak dari button */
    color: #1976d2;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }
  a:hover {
    text-decoration: underline;
    color: #125ea2;
  }

  @media(max-width:500px){
    .container { padding: 32px 24px; }
    input { padding: 8px; font-size: 14px; }
    button { padding: 10px; font-size: 15px; }
  }
</style>
</head>
<body>
<div class="container">
  <h2>Daftar Akaun Baru</h2>
  <input type="text" id="name" placeholder="Nama Staff" required>
  <input type="email" id="email" placeholder="Email Staff" required>
  <input type="password" id="password" placeholder="Kata Laluan" required>
  
  <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
  <p style="font-size: 14px; color: #666; margin-bottom: 15px;">Soalan Keselamatan (untuk reset password)</p>
  
  <select id="securityQuestion" style="width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #b6d0f7; border-radius: 8px; font-size: 14px;">
    <option value="">Pilih Soalan Keselamatan</option>
    <option value="Nama sekolah rendah pertama anda?">Nama sekolah rendah pertama anda?</option>
    <option value="Nama ibu anda?">Nama ibu anda?</option>
    <option value="Nama bandar tempat anda dilahirkan?">Nama bandar tempat anda dilahirkan?</option>
    <option value="Nama haiwan peliharaan pertama anda?">Nama haiwan peliharaan pertama anda?</option>
    <option value="Makanan kegemaran anda?">Makanan kegemaran anda?</option>
  </select>
  
  <input type="text" id="securityAnswer" placeholder="Jawapan Soalan Keselamatan" required>
  
  <button id="submitRegister" type="button">Daftar</button>
  <a href="index.html">Kembali ke Login</a>
</div>

<script src="config.js"></script>
<script>
document.getElementById('submitRegister').addEventListener('click', async ()=>{
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const securityQuestion = document.getElementById('securityQuestion').value;
  const securityAnswer = document.getElementById('securityAnswer').value.trim();

  if(!name||!email||!password){ 
    alert('Sila lengkapkan semua ruangan'); 
    return; 
  }
  
  if(!securityQuestion||!securityAnswer){
    alert('Sila pilih soalan keselamatan dan masukkan jawapan');
    return;
  }

  let registerSuccess = false;
  
  // Try Google Apps Script first jika dikonfigurasi
  if (typeof isConfigured === 'function' && isConfigured()) {
    try {
      console.log('Attempting register with Google Sheet:', email);
      const result = await registerUser(name, email, password, securityQuestion, securityAnswer);
      console.log('Register result:', result);
      
      if (result && result.success) {
        // Also save to localStorage for offline access
        let users = JSON.parse(localStorage.getItem('users')||'[]');
        if(!users.some(u=>u.email.toLowerCase()===email.toLowerCase())){
          users.push({name,email,password,securityQuestion,securityAnswer});
          localStorage.setItem('users', JSON.stringify(users));
        }
        
        alert('Pendaftaran berjaya! Sila login.');
        window.location.href='index.html';
        registerSuccess = true;
      } else if (result && result.message) {
        console.warn('Google Sheet register failed:', result.message);
      }
    } catch (error) {
      console.error('Google Sheet error, trying localStorage fallback:', error);
    }
  }
  
  // Fallback ke localStorage jika Google Sheet fail atau tidak configured
  if (!registerSuccess) {
    console.log('Using localStorage for registration');
    let users = JSON.parse(localStorage.getItem('users')||'[]');
    if(users.some(u=>u.email.toLowerCase()===email.toLowerCase())){ 
      alert('Email sudah digunakan'); 
      return; 
    }

    users.push({name,email,password,securityQuestion,securityAnswer});
    localStorage.setItem('users', JSON.stringify(users));
    
    alert('Pendaftaran berjaya! Sila login.');
    window.location.href='index.html';
  }
});
</script>
</body>
</html>

<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lupa Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #e3f0ff 0%, #f0f7ff 100%);
    position: relative;
    overflow-x: hidden;
  }
  
  body::before {
    content: '';
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    background: 
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%231976d2" fill-opacity="0.05" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,112C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom center / 100% 250px no-repeat,
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%2343a047" fill-opacity="0.04" d="M0,160L48,170.7C96,181,192,203,288,197.3C384,192,480,160,576,149.3C672,139,768,149,864,165.3C960,181,1056,203,1152,197.3C1248,192,1344,160,1392,144L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom center / 100% 200px no-repeat;
    animation: wave-animation 15s ease-in-out infinite;
  }

  @keyframes wave-animation {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(-2%) translateY(-1%); }
    50% { transform: translateX(2%) translateY(1%); }
    75% { transform: translateX(-1%) translateY(-0.5%); }
  }

  .container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(25,118,210,0.15);
    width: 100%;
    max-width: 420px;
    z-index: 1;
    position: relative;
    animation: fadeInUp 0.6s;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  h2 {
    text-align: center;
    color: #1976d2;
    margin-bottom: 10px;
    font-weight: 700;
    font-size: 28px;
  }

  .subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
    font-size: 14px;
  }

  input, select {
    width: 100%;
    padding: 14px;
    margin-bottom: 16px;
    border: 2px solid #b6d0f7;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 15px;
    font-family: 'Poppins', sans-serif;
    transition: all 0.3s;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #1976d2;
    box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg,#1976d2 60%,#42a5f5 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s;
    box-shadow: 0 4px 12px rgba(25,118,210,0.3);
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }

  button:hover::before {
    width: 300px;
    height: 300px;
  }

  button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 6px 20px rgba(25,118,210,0.4);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  a {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #1976d2;
    text-decoration: none;
    font-weight: 500;
  }

  a:hover {
    text-decoration: underline;
  }

  .step {
    display: none;
  }

  .step.active {
    display: block;
  }

  .loading {
    display: inline-block;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (max-width: 480px) {
    .container {
      padding: 30px 20px;
      max-width: 340px;
    }
    h2 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Step 1: Enter Email -->
  <div id="step1" class="step active">
    <h2>Lupa Password?</h2>
    <p class="subtitle">Masukkan email anda untuk reset password</p>
    <input type="email" id="email" placeholder="Email Anda" required>
    <button id="checkEmailBtn">Seterusnya</button>
    <a href="login.html">Kembali ke Login</a>
  </div>

  <!-- Step 2: Answer Security Question -->
  <div id="step2" class="step">
    <h2>Soalan Keselamatan</h2>
    <p class="subtitle" id="questionDisplay" style="font-weight: 600; color: #333;"></p>
    <input type="text" id="answer" placeholder="Jawapan Anda" required>
    <button id="verifyAnswerBtn">Verify</button>
    <a href="#" onclick="goToStep(1); return false;">Kembali</a>
  </div>

  <!-- Step 3: Set New Password -->
  <div id="step3" class="step">
    <h2>Password Baru</h2>
    <p class="subtitle">Masukkan password baru anda</p>
    <input type="password" id="newPassword" placeholder="Password Baru" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <button id="resetPasswordBtn">Reset Password</button>
    <a href="login.html">Kembali ke Login</a>
  </div>
</div>

<script src="config.js"></script>
<script>
  let currentEmail = '';
  let currentUser = null;

  function goToStep(stepNumber) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + stepNumber).classList.add('active');
  }

  // Step 1: Check email exists
  document.getElementById('checkEmailBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim().toLowerCase();
    const btn = document.getElementById('checkEmailBtn');

    if (!email) {
      alert('Sila masukkan email!');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Memeriksa... <span class="loading">●</span>';

    // Check localStorage first
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    let user = users.find(u => u.email.toLowerCase() === email);

    // Try Google Sheet if not found locally
    if (!user && typeof isConfigured === 'function' && isConfigured()) {
      try {
        const allUsers = await getUsers();
        if (allUsers) {
          users = allUsers;
          localStorage.setItem('users', JSON.stringify(users));
          user = users.find(u => u.email.toLowerCase() === email);
        }
      } catch (error) {
        console.error('Error fetching users:', error);
      }
    }

    btn.disabled = false;
    btn.innerHTML = 'Seterusnya';

    if (!user) {
      alert('Email tidak dijumpai!');
      return;
    }

    if (!user.securityQuestion || !user.securityAnswer) {
      alert('Akaun ini tidak mempunyai soalan keselamatan. Sila hubungi admin.');
      return;
    }

    currentEmail = email;
    currentUser = user;
    document.getElementById('questionDisplay').textContent = user.securityQuestion;
    goToStep(2);
  });

  // Step 2: Verify answer
  document.getElementById('verifyAnswerBtn').addEventListener('click', () => {
    const answer = document.getElementById('answer').value.trim().toLowerCase();
    const btn = document.getElementById('verifyAnswerBtn');

    if (!answer) {
      alert('Sila masukkan jawapan!');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Verifying... <span class="loading">●</span>';

    setTimeout(() => {
      if (answer === currentUser.securityAnswer.toLowerCase()) {
        goToStep(3);
      } else {
        alert('Jawapan salah! Cuba lagi.');
      }
      btn.disabled = false;
      btn.innerHTML = 'Verify';
      document.getElementById('answer').value = '';
    }, 500);
  });

  // Step 3: Reset password
  document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
    const newPassword = document.getElementById('newPassword').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const btn = document.getElementById('resetPasswordBtn');

    if (!newPassword || !confirmPassword) {
      alert('Sila lengkapkan semua ruangan!');
      return;
    }

    if (newPassword !== confirmPassword) {
      alert('Password tidak sepadan!');
      return;
    }

    if (newPassword.length < 6) {
      alert('Password mestilah sekurang-kurangnya 6 aksara!');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Memproses... <span class="loading">●</span>';

    // Update localStorage
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    const userIndex = users.findIndex(u => u.email.toLowerCase() === currentEmail);
    if (userIndex !== -1) {
      users[userIndex].password = newPassword;
      localStorage.setItem('users', JSON.stringify(users));
    }

    // Update Google Sheet if configured
    if (typeof isConfigured === 'function' && isConfigured()) {
      try {
        const url = GOOGLE_APPS_SCRIPT_CONFIG.webAppUrl + 
                    '?action=resetPassword&email=' + encodeURIComponent(currentEmail) + 
                    '&newPassword=' + encodeURIComponent(newPassword);
        await fetch(url, { method: 'GET', redirect: 'follow' });
        console.log('Password updated in Google Sheet');
      } catch (error) {
        console.error('Error updating Google Sheet:', error);
      }
    }

    btn.disabled = false;
    btn.innerHTML = 'Reset Password';

    alert('Password berjaya ditukar! Sila login dengan password baru.');
    window.location.href = 'login.html';
  });
</script>
</body>
</html>

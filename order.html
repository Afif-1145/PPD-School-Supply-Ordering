<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Borang Order Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { 
    font-family: 'Poppins', 'Segoe UI',Arial,sans-serif; 
    margin:0; 
    padding:0; 
    min-height:100vh; 
    display:flex; 
    justify-content:center; 
    align-items:flex-start; 
    padding-top:50px; 
    position: relative;
    background: linear-gradient(to bottom, #e3f0ff 0%, #f0f7ff 100%);
    overflow-x: hidden;
  }
  
  body::before {
    content: '';
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    background: 
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%231976d2" fill-opacity="0.05" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,138.7C960,139,1056,117,1152,112C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom center / 100% 250px no-repeat,
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%2343a047" fill-opacity="0.04" d="M0,160L48,170.7C96,181,192,203,288,197.3C384,192,480,160,576,149.3C672,139,768,149,864,165.3C960,181,1056,203,1152,197.3C1248,192,1344,160,1392,144L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') bottom center / 100% 200px no-repeat;
    animation: wave-animation 15s ease-in-out infinite;
  }
  
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    background: 
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%2342a5f5" fill-opacity="0.06" d="M0,64L48,80C96,96,192,128,288,128C384,128,480,96,576,90.7C672,85,768,107,864,122.7C960,139,1056,149,1152,138.7C1248,128,1344,96,1392,80L1440,64L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>') top center / 100% 200px no-repeat,
      url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="%2366bb6a" fill-opacity="0.04" d="M0,96L48,106.7C96,117,192,139,288,138.7C384,139,480,117,576,101.3C672,85,768,75,864,90.7C960,107,1056,149,1152,154.7C1248,160,1344,128,1392,112L1440,96L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path></svg>') top center / 100% 180px no-repeat;
    animation: wave-animation-reverse 18s ease-in-out infinite;
  }
  
  @keyframes wave-animation {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(-2%) translateY(-3px); }
    50% { transform: translateX(0) translateY(-5px); }
    75% { transform: translateX(2%) translateY(-3px); }
  }
  
  @keyframes wave-animation-reverse {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(2%) translateY(3px); }
    50% { transform: translateX(0) translateY(5px); }
    75% { transform: translateX(-2%) translateY(3px); }
  }

  .container { 
    position: relative;
    max-width:700px; 
    margin:0 auto; 
    background:#fff; 
    border-radius:20px; 
    padding:36px; 
    text-align:center; 
    box-shadow: 0 10px 40px rgba(25,118,210,0.15), 0 3px 12px rgba(0,0,0,0.08);
    z-index:5;
    animation: fadeInUp 0.6s ease-out;
  }
  
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  h2 { color:#1976d2; margin-bottom:24px; font-size:28px; font-weight: 700; letter-spacing: -0.5px; }
  label { display:block; margin-top:12px; text-align:left; font-weight:500; font-size:15px; }
  input, select { width:100%; padding:10px 12px; margin-top:6px; border-radius:8px; border:2px solid #e3f0ff; font-size:15px; box-sizing: border-box; transition: all 0.3s ease; }
  
  input:focus, select:focus {
    outline: none;
    border-color: #1976d2;
    box-shadow: 0 0 0 3px rgba(25,118,210,0.1);
  }

  button, a {
    display:block;
    width:100%;
    margin-top:12px;
    text-align:center;
    padding:12px 0;
    border-radius:12px;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    border:none;
  }
  button#submitBtn { 
    background: linear-gradient(135deg, #43a047 0%, #66bb6a 100%);
    color:#fff;
    box-shadow: 0 4px 15px rgba(67,160,71,0.3);
    position: relative;
    overflow: hidden;
  }
  
  button#submitBtn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }
  
  button#submitBtn:hover:enabled::before {
    width: 300px;
    height: 300px;
  }
  
  button#submitBtn:disabled {
    background:#a5d6a7;
    cursor:not-allowed;
    box-shadow: none;
  }
  button#submitBtn:hover:enabled { 
    transform:translateY(-3px) scale(1.02); 
    box-shadow:0 6px 20px rgba(67,160,71,0.4); 
  }

  button.secondary-btn { background:#1976d2; color:#fff; }
  button.secondary-btn:hover { background:#125ea2; }

  a { background:#43a047; color:#fff; text-decoration:none; }
  a:hover { background:#338a3e; }

  table { width:100%; border-collapse: collapse; margin-top:20px; font-size:14px;}
  table, th, td { border:1px solid #b6d0f7; }
  th, td { padding:10px; text-align:center; }
  #myOrdersDiv { display:none; margin-top:12px; }

  .delete-btn { background:#e53935; padding:6px 12px; border-radius:8px; cursor:pointer; border:none; color:#fff; font-weight:500; transition:background 0.2s; }
  .delete-btn:hover { background:#c62828; }

  /* Mobile responsive */
  @media (max-width: 768px) {
    body { 
      padding: 20px 10px; 
      align-items: flex-start;
    }
    .container { 
      padding: 24px 16px; 
      border-radius: 16px;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    h2 { 
      font-size: 22px; 
      margin-bottom: 20px;
    }
    h3 {
      font-size: 18px;
    }
    input, select { 
      padding: 12px; 
      font-size: 16px; /* Prevent zoom on iOS */
      -webkit-appearance: none;
    }
    button, a { 
      padding: 14px 0; 
      font-size: 16px;
      margin-top: 14px;
      min-height: 48px; /* Touch-friendly */
    }
    table { 
      font-size: 12px;
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    th, td { 
      padding: 8px 4px;
      min-width: 60px;
    }
    .delete-btn {
      padding: 8px 12px;
      font-size: 13px;
      min-height: 36px;
    }
    label {
      font-size: 14px;
    }
  }

  @media (max-width: 480px) {
    .container {
      padding: 20px 12px;
    }
    h2 {
      font-size: 20px;
    }
    table {
      font-size: 11px;
    }
    th, td {
      padding: 6px 3px;
      min-width: 50px;
    }
  }

  /* Loading indicator */
  .loading {
    display: inline-block;
    margin-left: 8px;
    color: #1976d2;
    font-size: 14px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
</style>
</head>
<body>
<div class="container">
  <h2>Borang Order (Staff)</h2>
  <form id="orderForm">
    <label for="teacherEmail">Email Staff</label>
    <input id="teacherEmail" type="email" required readonly />

    <label for="teacherName">Nama Staff</label>
    <input id="teacherName" required readonly />

    <label for="itemSelect">Pilih Barang</label>
    <select id="itemSelect"></select>

    <label for="qty">Kuantiti</label>
    <input id="qty" type="number" min="1" value="1" required />

    <button type="submit" id="submitBtn">Hantar Order</button>
  </form>

  <button id="checkOrdersBtn" class="secondary-btn">Semak Order Saya</button>

  <div id="myOrdersDiv">
    <h3>Order Saya</h3>
    <table>
      <thead>
        <tr><th>Barang</th><th>Kuantiti</th><th>Status</th><th>Tarikh</th><th>Tindakan</th></tr>
      </thead>
      <tbody id="ordersTbody"></tbody>
    </table>
    <button id="deleteAllBtn" class="delete-btn" style="width: 100%; margin-top: 12px; display: none;">Padam Semua Order</button>
  </div>

  <a href="stock.html">Lihat Stok Barang</a>
  <a href="index.html" class="secondary-btn">Log Out</a>
</div>

<script src="config.js"></script>
<script>
// -- JS sama seperti sebelumnya --
const currentUser = JSON.parse(localStorage.getItem('currentUser'));
if(!currentUser){ alert('Sila login dahulu'); window.location.href='index.html'; }
document.getElementById('teacherEmail').value = currentUser.email;
document.getElementById('teacherName').value = currentUser.name;

const submitBtn = document.getElementById('submitBtn');
const qtyInput = document.getElementById('qty');
const itemSelect = document.getElementById('itemSelect');

async function populateItemSelect(){
  let items = [];
  
  // Cuba ambil dari Google Sheet dulu
  if (typeof isConfigured === 'function' && isConfigured()) {
    items = await getItems();
    if (items) {
      // Sync ke localStorage juga
      localStorage.setItem('itemsStock', JSON.stringify(items));
    }
  }
  
  // Fallback ke localStorage jika Google Sheet tidak ada
  if (!items || items.length === 0) {
    items = JSON.parse(localStorage.getItem('itemsStock') || '[]');
  }
  
  itemSelect.innerHTML = '';
  const availableItems = items.filter(i => i.stock > 0);
  if(availableItems.length === 0){
    const opt = document.createElement('option'); 
    opt.textContent = 'Tiada stok barang'; 
    opt.value = ''; 
    itemSelect.appendChild(opt); 
    submitBtn.disabled = true; 
  } else {
    availableItems.forEach(item => {
      const opt = document.createElement('option'); 
      opt.value = item.name; 
      opt.textContent = `${item.name} (Stok: ${item.stock})`; 
      itemSelect.appendChild(opt);
    });
    submitBtn.disabled = false; 
  }
}
populateItemSelect();

document.getElementById('orderForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  
  // Get submit button reference
  const submitBtn = e.target.querySelector('button[type="submit"]');
  const originalText = submitBtn.innerHTML;
  
  try {
    // Show loading state
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Menghantar... <span class="loading">●</span>';
    
    const item = itemSelect.value;
    const qty = parseInt(qtyInput.value,10);

    const items = JSON.parse(localStorage.getItem('itemsStock') || '[]');
    const idx = items.findIndex(i=>i.name===item);
    if(idx!==-1){
      if(qty>items[idx].stock){ 
        alert(`Stok tidak mencukupi. Stok tersedia: ${items[idx].stock}`); 
        return; 
      }
      
      // Update stok di localStorage dan Google Sheet
      const newStock = items[idx].stock - qty;
      items[idx].stock = newStock;
      localStorage.setItem('itemsStock', JSON.stringify(items));
      
      // Update ke Google Sheet jika configured
      if (typeof isConfigured === 'function' && isConfigured()) {
        await updateItem(item, newStock);
      }
      
      populateItemSelect(); 
    }

    // Simpan order ke localStorage
    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
    orders.unshift({name: currentUser.name, email: currentUser.email, item, qty, status:'pending', date:new Date().toLocaleString()});
    localStorage.setItem('orders', JSON.stringify(orders));
    
    // Hantar order ke Google Sheet (Teacher Stock sheet)
    if (typeof isConfigured === 'function' && isConfigured()) {
      await requestStock(currentUser.email, currentUser.name, item, qty);
    }
    
    alert('Order berjaya dihantar!');
    document.getElementById('qty').value = 1;
    if(showing) renderOrders();
  } finally {
    // Always restore button state
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalText;
  }
});

let showing = false;
const checkBtn = document.getElementById('checkOrdersBtn');
const ordersTbody = document.getElementById('ordersTbody');
const myOrdersDiv = document.getElementById('myOrdersDiv');

function renderOrders(){
  const orders = JSON.parse(localStorage.getItem('orders') || '[]');
  const myOrders = orders.filter(o => o.email === currentUser.email);
  const deleteAllBtn = document.getElementById('deleteAllBtn');

  ordersTbody.innerHTML = '';
  if(myOrders.length===0){
    ordersTbody.innerHTML = '<tr><td colspan="5">Tiada order.</td></tr>';
    deleteAllBtn.style.display = 'none';
  } else {
    deleteAllBtn.style.display = 'block';
    myOrders.forEach((o) => {
      const tr = document.createElement('tr');
      const canDelete = o.status === 'pending';
      const deleteBtn = canDelete ? '<button class="delete-btn">Padam</button>' : '<span style="color: #999;">-</span>';
      
      tr.innerHTML = `<td>${o.item}</td>
                      <td>${o.qty}</td>
                      <td>${o.status}</td>
                      <td>${o.date}</td>
                      <td>${deleteBtn}</td>`;
      ordersTbody.appendChild(tr);

      if (canDelete) {
        tr.querySelector('.delete-btn').addEventListener('click', async (e)=>{
        const deleteBtn = e.target;
        const originalText = deleteBtn.innerHTML;
        
        try {
          // Show loading state
          deleteBtn.disabled = true;
          deleteBtn.innerHTML = '<span class="loading">●</span>';
          
          const allOrders = JSON.parse(localStorage.getItem('orders') || '[]');
          const items = JSON.parse(localStorage.getItem('itemsStock') || '[]');

          const idxInAll = allOrders.findIndex(order=>order.email===currentUser.email && order.item===o.item && order.date===o.date);
          if(idxInAll!==-1){
            const itemIdx = items.findIndex(i=>i.name===o.item);
            if(itemIdx!==-1){ 
              const newStock = items[itemIdx].stock + o.qty;
              items[itemIdx].stock = newStock;
              localStorage.setItem('itemsStock', JSON.stringify(items));
              
              // Update stok ke Google Sheet juga
              if (typeof isConfigured === 'function' && isConfigured()) {
                await updateItem(o.item, newStock);
              }
              
              populateItemSelect();
            }
            
            // Delete order dari Google Sheet (Pending sheet) - tanpa date untuk delete first match
            if (typeof isConfigured === 'function' && isConfigured()) {
              await deleteOrder(currentUser.email, o.item, null);
            }
            
            allOrders.splice(idxInAll,1);
            localStorage.setItem('orders', JSON.stringify(allOrders));
            renderOrders();
          }
        } catch (error) {
          console.error('Error deleting order:', error);
          deleteBtn.disabled = false;
          deleteBtn.innerHTML = originalText;
        }
        });
      }
    });
  }
}

// Delete all orders handler
document.getElementById('deleteAllBtn').addEventListener('click', async (e) => {
  if (!confirm('Adakah anda pasti mahu padam SEMUA order pending anda?')) return;
  
  const deleteAllBtn = e.target;
  const originalText = deleteAllBtn.innerHTML;
  
  try {
    // Show loading state
    deleteAllBtn.disabled = true;
    deleteAllBtn.innerHTML = 'Memproses... <span class="loading">●</span>';
    
    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
    const myOrders = orders.filter(o => o.email === currentUser.email && o.status === 'pending');
    
    if (myOrders.length === 0) {
      alert('Tiada order pending untuk dipadamkan.');
      return;
    }
    
    const items = JSON.parse(localStorage.getItem('itemsStock') || '[]');
    
    // Restore stock untuk semua order
    for (const o of myOrders) {
      const itemIdx = items.findIndex(i => i.name === o.item);
      if (itemIdx !== -1) {
        items[itemIdx].stock += o.qty;
      }
    }
    
    localStorage.setItem('itemsStock', JSON.stringify(items));
    
    // Update stok ke Google Sheet
    if (typeof isConfigured === 'function' && isConfigured()) {
      // Get unique items yang perlu update
      const itemsToUpdate = {};
      for (const o of myOrders) {
        if (!itemsToUpdate[o.item]) {
          itemsToUpdate[o.item] = 0;
        }
        itemsToUpdate[o.item] += o.qty;
      }
      
      // Update each unique item
      for (const [itemName, qtyToAdd] of Object.entries(itemsToUpdate)) {
        const item = items.find(i => i.name === itemName);
        if (item) {
          await updateItem(itemName, item.stock);
        }
      }
      
      // Delete all orders dari Google Sheet (tanpa date - akan delete semua match)
      const uniqueItems = [...new Set(myOrders.map(o => o.item))];
      for (const itemName of uniqueItems) {
        await deleteOrder(currentUser.email, itemName, null);
      }
    }
    
    // Remove PENDING orders only from localStorage
    const remainingOrders = orders.filter(o => !(o.email === currentUser.email && o.status === 'pending'));
    localStorage.setItem('orders', JSON.stringify(remainingOrders));
    
    populateItemSelect();
    renderOrders();
    alert('Semua order pending telah dipadamkan.');
  } finally {
    // Always restore button state
    deleteAllBtn.disabled = false;
    deleteAllBtn.innerHTML = originalText;
  }
});

checkBtn.addEventListener('click', ()=>{
  showing = !showing;
  myOrdersDiv.style.display = showing ? 'block' : 'none';
  if(showing) renderOrders();
});
</script>
</body>
</html>
